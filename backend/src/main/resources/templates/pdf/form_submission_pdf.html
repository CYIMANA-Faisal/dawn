<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <style>
        body { font-family: 'DejaVu Sans', sans-serif; margin: 40px; color: #333; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
        .form-title { font-size: 24px; font-weight: bold; color: #2e7d32; }
        .section { margin-top: 25px; }
        .section-title { font-size: 18px; font-weight: bold; background-color: #f1f8e9; padding: 5px 10px; border-left: 4px solid #2e7d32; margin-bottom: 15px; }
        .question-group { margin-bottom: 15px; page-break-inside: avoid; }
        .label { font-weight: bold; font-size: 14px; color: #555; }
        .value { font-size: 15px; margin-top: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .signature-section { margin-top: 50px; border-top: 1px solid #ddd; padding-top: 20px; }
        .signature-image { max-width: 300px; max-height: 150px; margin-top: 10px; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; font-size: 10px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <div class="form-title" th:text="${form.title}">Form Title</div>
        <p th:text="${form.subtitle}">Form Subtitle</p>
    </div>

    <div class="section">
        <div class="section-title">Respondent Information</div>
        <div class="question-group">
            <div class="label">Name</div>
            <div class="value" th:text="${shareholder.name}">Shareholder Name</div>
        </div>
        <div class="question-group">
            <div class="label">Email</div>
            <div class="value" th:text="${shareholder.email}">Email</div>
        </div>
    </div>

    <div th:each="section : ${form.sections}" class="section">
        <div class="section-title" th:text="${section.title}">Section Title</div>
        
        <div th:each="question : ${section.questions}" class="question-group">
            <div th:if="${formattedResponses.containsKey(question.key)}">
                <div class="label" th:text="${question.label}">Question Label</div>
                <div class="value" th:text="${formattedResponses.get(question.key)}">Response</div>
            </div>
        </div>
    </div>

    <div class="signature-section">
        <div class="section-title">Signature</div>
        <p>Digitally signed by <strong th:text="${shareholder.name}">Name</strong> on <span th:text="${#temporals.format(#temporals.createNow(), 'dd MMMM yyyy HH:mm')}">Date</span></p>
        <img th:if="${signatureImage != null}" th:src="${signatureImage}" class="signature-image" alt="Signature"/>
    </div>

    <div class="footer">
        Generated by Dawn Platform | Submission ID: <span th:text="${#ids.seq('submission')}"></span>
    </div>
</body>
</html>
