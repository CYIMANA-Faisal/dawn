<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form Submission Receipt</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
        <h2 style="color: #2e7d32;">Thank you, <span th:text="${shareholderName}">Shareholder</span>!</h2>
        <p>Your submission for <strong><span th:text="${formTitle}">Form Title</span></strong> has been received successfully.</p>
        <p>We have attached a signed PDF copy of your submission to this email for your records.</p>
        <p>If you have any questions, please don't hesitate to contact us.</p>
        <br>
        <p>Best regards,<br>The Dawn Team</p>
    </div>
</body>
</html>
