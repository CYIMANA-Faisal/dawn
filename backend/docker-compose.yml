services:
  db:
    image: postgres:18-alpine
    container_name: dawn-db
    restart: always
    environment:
      POSTGRES_DB: dawn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password@123
    ports:
      - "7684:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dawn" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: cyimana/dawn-api:latest
    container_name: dawn-api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres_data:
